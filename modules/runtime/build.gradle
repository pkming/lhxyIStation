plugins {
    id 'com.android.library'
}

android {
    namespace 'com.lhxy.istationdevice.android11.runtime'
    compileSdk 35

    defaultConfig {
        minSdk 26
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation project(':modules:domain')
    implementation project(':modules:device-api')
    implementation project(':modules:device-m90')
}
